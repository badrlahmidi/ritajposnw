<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RITAJ SMART POS</title>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
    iframe { width: 100%; height: 100vh; border: none; }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .loading h1 { color: #2980b9; }
    .loading p { color: #777; }
    .error { display: none; text-align: center; padding: 40px; }
    .error h2 { color: #e74c3c; }
    .retry-btn { padding: 12px 30px; background: #2980b9; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 15px; }
    .retry-btn:hover { background: #1a5276; }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <h1>🏪 RITAJ SMART POS</h1>
    <p>Connexion au serveur...</p>
  </div>
  <div class="error" id="error">
    <h2>Serveur non disponible</h2>
    <p>Impossible de se connecter au serveur POS.</p>
    <p>Assurez-vous que le serveur est lance :</p>
    <code>cd server && node server.js</code>
    <br>
    <button class="retry-btn" onclick="tryConnect()">Reessayer</button>
  </div>
  <iframe id="app" style="display:none;"></iframe>

  <script>
    var SERVER_URL = 'http://localhost:3000/pos/';
    
    function tryConnect() {
      document.getElementById('loading').style.display = 'flex';
      document.getElementById('error').style.display = 'none';
      document.getElementById('app').style.display = 'none';
      
      var xhr = new XMLHttpRequest();
      xhr.open('GET', SERVER_URL, true);
      xhr.timeout = 5000;
      xhr.onload = function() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('app').src = SERVER_URL;
      };
      xhr.onerror = function() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
      };
      xhr.ontimeout = function() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
      };
      xhr.send();
    }
    
    tryConnect();
  </script>
</body>
</html>
